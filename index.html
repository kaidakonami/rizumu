<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル音ゲー</title>
<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

h1 {
    margin: 10px;
}

#game {
    position: relative;
    width: 300px;
    height: 500px;
    margin: 0 auto;
    background: #222;
    overflow: hidden;
    border: 3px solid #555;
}

.note {
    position: absolute;
    width: 100%;
    height: 20px;
    background: cyan;
    border-radius: 10px;
}

#judgeLine {
    position: absolute;
    bottom: 80px;
    width: 100%;
    height: 5px;
    background: yellow;
}

#hitBtn {
    margin-top: 20px;
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: orange;
}

#score, #combo, #judge {
    margin: 10px;
    font-size: 20px;
}
</style>
</head>
<body>

<h1>🎵 音ゲー</h1>

<div id="score">Score: 0</div>
<div id="combo">Combo: 0</div>
<div id="judge">---</div>

<div id="game">
    <div id="judgeLine"></div>
</div>

<button id="hitBtn">TAP!</button>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const judgeEl = document.getElementById("judge");

let score = 0;
let combo = 0;
let notes = [];

// ノーツ生成
function spawnNote() {
    const note = document.createElement("div");
    note.className = "note";
    note.style.top = "0px";
    game.appendChild(note);

    notes.push({
        el: note,
        y: 0
    });
}

// ノーツを動かす
function updateNotes() {
    for (let i = notes.length - 1; i >= 0; i--) {
        const n = notes[i];
        n.y += 4;
        n.el.style.top = n.y + "px";

        // MISS判定
        if (n.y > 420) {
            game.removeChild(n.el);
            notes.splice(i, 1);
            combo = 0;
            judgeEl.textContent = "MISS";
        }
    }
}

// 判定
function hitNote() {
    let hit = false;

    for (let i = 0; i < notes.length; i++) {
        const n = notes[i];
        const diff = Math.abs(n.y - 400);

        if (diff < 15) {
            score += 100;
            combo++;
            judgeEl.textContent = "PERFECT!";
            game.removeChild(n.el);
            notes.splice(i, 1);
            hit = true;
            break;
        } else if (diff < 35) {
            score += 50;
            combo++;
            judgeEl.textContent = "GOOD!";
            game.removeChild(n.el);
            notes.splice(i, 1);
            hit = true;
            break;
        }
    }

    if (!hit) {
        combo = 0;
        judgeEl.textContent = "MISS";
    }

    scoreEl.textContent = "Score: " + score;
    comboEl.textContent = "Combo: " + combo;
}

// イベント
document.getElementById("hitBtn").addEventListener("click", hitNote);

// ループ
setInterval(updateNotes, 16);

// ノーツ生成（ランダム）
setInterval(spawnNote, 800);
</script>

</body>
</html>
